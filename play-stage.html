<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dream Puzzle</title>

  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Quicksand:wght@600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="play-stage.css" />
</head>

<body>
  <main class="appFrame" aria-label="パズルアプリ画面">
    <header class="topBar">

      <!-- メイン操作グループ -->
      <div class="mainControls">
        <button class="iconBtn backBtn" type="button" aria-label="ステージ選択に戻る">‹</button>
    
        <div class="glassPill">00:00</div>
    
        <button class="iconBtn iconBtn--sm playToggleBtn" type="button" aria-label="一時停止">
          Ⅱ
        </button>
      </div>
    
      <!-- ヘルプは別 -->
      <button class="helpBtn" type="button" aria-label="使い方">?</button>
      <div class="helpModal" hidden>
        <div class="helpModal__overlay"></div>
      
        <div class="helpModal__content">
          <h2>遊び方</h2>
      
          <ul class="helpList">
            <li>ピースをドラッグして配置</li>
            <li>タップで回転</li>
            <li>完成すると★評価</li>
          </ul>
      
          <div class="helpActions">
            <button class="btnClose">OK</button>
            <label class="dontShow">
              <input type="checkbox"> 次回から表示しない
            </label>
          </div>
        </div>
      </div>
    </header>
    
    <div class="subControls">
      <div class="progressBox">
        <p class="progressText">0 / 5</p>
    
        <div class="starRating">
          <span>★</span>
          <span>★</span>
          <span>★</span>
        </div>
    
        <div class="progressBar">
          <span></span>
        </div>
      </div>
  
    </div>

    <section class="puzzleBoard" aria-label="パズルボード">
      <img id="puzzleImage" src="" alt="">
      <div class="dropLayer"></div>
    </section>

    <div class="bottomActions">
      <button class="actionBtn actionBtn--primary hintBtn" type="button">
        ヒント
        <span class="hintCount">3</span>
      </button>
      <button class="actionBtn resetBtn" type="button">
        リセット
        <span class="resetCount">5</span>
      </button>
      <button class="actionBtn previewBtn" type="button">プレビュー</button>
    </div>

    <section class="pieceSection" aria-label="ピーストレイ">
      <div class="pieceHeader">
        <div>
          <p class="pieceTitle">PIECE TRAY</p>
          <p class="pieceLead">ドラッグしてピースを配置しよう</p>
        </div>

        <div class="pieceOptions">
          <button class="gridBtn" type="button" aria-label="グリッド表示">
            <span class="gridBtnIcon" aria-hidden="true">
              <span></span><span></span><span></span><span></span>
            </span>
          </button>
        </div>
      </div>

      <div class="pieceTray">
        <button class="trayArrow trayArrow--prev" type="button" aria-label="前のピース">‹</button>

        <div class="pieces">
          <div class="pieceCard" data-id="0"></div>
          <div class="pieceCard" data-id="1"></div>
          <div class="pieceCard" data-id="2"></div>
          <div class="pieceCard" data-id="3"></div>
          <div class="pieceCard" data-id="4"></div>
          <div class="pieceCard" data-id="5"></div>
          <div class="pieceCard" data-id="6"></div>
          <div class="pieceCard" data-id="7"></div>
          <div class="pieceCard" data-id="8"></div>
        </div>

        <button class="trayArrow trayArrow--next" type="button" aria-label="次のピース">›</button>
      </div>
    </section>



    <!-- プレビュー画面 -->
    <div class="previewModal" aria-hidden="true">
      <div class="previewModal__inner">
        <button class="previewModal__close" type="button">×</button>
        <p class="previewModal__title">完成イメージ</p>
        <img src="" alt="完成イメージ">
      </div>
    </div>

    <div class="resultModal" aria-hidden="true">
      <div class="resultModal__inner">
        <p class="resultModal__label">Puzzle Complete</p>
        <h2 class="resultModal__title">Complete!</h2>
    
        <div class="resultStars">★★★</div>
    
        <p class="resultModal__text">
          すべてのピースが完成しました
        </p>

        <button class="resultModal__btn nextStageBtn" type="button">次のステージで遊ぶ</button>
        <button class="resultModal__btn resultModal__btn--secondary retryBtn" type="button">もう一度遊ぶ</button>

        <button class="resultModal__subBtn resultClose" type="button">
          閉じる
        </button>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
